<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypter & Decrypter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1 id="TitleText">Encrypter & Decrypter</h1>
        <div id="toolbar">
            <button id="encryptButton">Encrypt</button>
            <button id="decryptButton">Decrypt</button>
            <button id="GenerateKeyButton">Generate Key</button>
            <button id="HashButton">Hash Text</button>
            <button id="CheckHashButton">Check Hash</button>
        </div>
        <div id="inputSection">
            <input type="text" id="inputText" placeholder="Enter text/hash here...">
            <input type="text" id="inputKey" placeholder="Enter key/Hash Filter here...">
        </div>
        <div id="outputSection">
            <h3 id="outputLabel">Output:</h3>
        </div>

    <script src="Encryption.js"></script>
    <script src="script.js"></script>
</body>
</html>
